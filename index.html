<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descobrir CEP por Endereço</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h2>🔍 Descobrir CEP</h2>
        
        <div class="form-group">
            <label>Estado (UF)</label>
            <input type="text" id="uf" placeholder="Ex: SP" maxlength="2">
        </div>

        <div class="form-group">
            <label>Cidade</label>
            <input type="text" id="cidade" placeholder="Ex: Sao Paulo">
        </div>

        <div class="form-group">
            <label>Logradouro (Rua/Av)</label>
            <input type="text" id="rua" placeholder="Ex: Praca da Se">
        </div>

        <button onclick="buscarCEP()">Buscar CEP</button>

        <div id="loading">Buscando...</div>
        <div id="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
